            <button

    <h1 style="text-align: center; color: #222; margin-bottom: 25px;">SQL Query</h1>

    <!-- SQL query form -->
    <form action="sql.php" method="post">
        <label>Enter your SQL query</label><br><br>

        <textarea
            name="query"
            rows="6"
            cols="80"
            required
            style="width: 100%; height: 150px; padding: 8px; resize: none; box-sizing: border-box; border: 1px solid #bfc7d1; border-radius: 6px;"><?php echo htmlspecialchars($query); ?></textarea>

        <br><br>

        <input
            type="submit"
            value="Run Query"
            style="padding: 10px 24px; font-size: 15px; cursor: pointer; background: #b91c1c; color: #fff; border: none; border-radius: 8px; font-weight: bold;">
    </form>

    <?php if ($has_query): ?>

        <h2 style="color: #333;">Executed Query</h2>

        <pre style="background: #ffffff; padding: 10px; border: 1px solid #d8dee8; border-radius: 6px; white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word;"><?php echo htmlspecialchars($query); ?></pre>

        <h2 style="color: #333;">Result</h2>

        <?php if (!empty($error)): ?>

            <p style="color: red;">
                <strong>Error:</strong> <?php echo htmlspecialchars($error); ?>
            </p>

        <?php elseif ($is_select): ?>

            <?php if (mysqli_num_rows($result) == 0): ?>
                <p>Query returned no rows.</p>
            <?php else: ?>

                <!-- Query result table -->
                <table style="width: 100%; table-layout: fixed; border-collapse: collapse; margin-top: 10px; margin-bottom: 20px; background: #ffffff;">
                    <tr>
                        <?php
                            $fields = mysqli_fetch_fields($result);
                            foreach ($fields as $field) {
                                echo "<th style='background: #b91c1c; color: white; padding: 10px; border: 1px solid #d8dee8; text-align: left; word-wrap: break-word; overflow-wrap: break-word;'>" . $field->name . "</th>";
                            }
                        ?>
                    </tr>

                    <?php
                        $row_count = 0;
                        while (($row = mysqli_fetch_array($result)) && $row_count < 100):
                            $row_count++;
                    ?>
                    <tr>
                        <?php foreach ($row as $key => $value): ?>
                            <?php if (!is_numeric($key)): ?>
                                <td style="padding: 10px; border: 1px solid #d8dee8; word-wrap: break-word; overflow-wrap: break-word;">
                                    <?php echo $value !== null ? htmlspecialchars($value) : "NULL"; ?>
                                </td>
                            <?php endif; ?>
                        <?php endforeach; ?>
                    </tr>
                    <?php endwhile; ?>
                </table>

                <p><em>Showing up to 100 rows.</em></p>

            <?php endif; ?>

        <?php else: ?>

            <p><strong><?php echo $affected_rows; ?></strong> row(s) affected.</p>

        <?php endif; ?>

    <?php endif; ?>
