<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
</head>

<body style="font-family: Arial; margin: 0; background: #e9eef5;">

<!--
    ERAY YALCIN - 20220702105
    login.html
    Login page of the MiniTube project.
    This page sends the entered username and password to login.php.
-->

<div style="max-width: 1100px; margin: 20px auto; padding: 30px; background: #f8fbff; min-height: 90vh; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);">

    <!-- Header with MiniTube logo and navigation buttons -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <div style="display: flex; align-items: center;">
            <div style="width: 180px; height: 72px; position: relative; margin-right: 18px;">
                <img
                    src="data/minitube_logo.png"
                    style="width: 240px; height: auto; position: absolute; left: 0; top: 50%; transform: translateY(-50%);">
            </div>
        </div>

        <div>
            <button
                type="button"
                onclick="window.location.href='index.html'"
                style="padding: 8px 16px; font-size: 14px; cursor: pointer; background: #065fd4; color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-right: 8px;">
                Initial Page
            </button>

            <button
                type="button"
                onclick="window.location.href='sql.php'"
                style="padding: 8px 16px; font-size: 14px; cursor: pointer; background: #065fd4; color: #fff; border: none; border-radius: 8px; font-weight: bold;">
                SQL Query Page
            </button>
        </div>
    </div>

    <!-- Login form -->
    <div style="text-align: center; margin-top: 100px;">
        <h1 style="color: #222; margin-bottom: 20px;">MiniTube Login</h1>

        <form action="login.php" method="post">
            Username<br>
            <input
                type="text"
                name="username"
                required
                style="padding: 9px; width: 220px; border: 1px solid #bfc7d1; border-radius: 6px; box-sizing: border-box;"><br><br>

            Password<br>
            <input
                type="password"
                name="password"
                required
                style="padding: 9px; width: 220px; border: 1px solid #bfc7d1; border-radius: 6px; box-sizing: border-box;"><br><br>

            <input
                type="submit"
                value="Submit"
                style="padding: 10px 24px; font-size: 15px; cursor: pointer; background: #b91c1c; color: #fff; border: none; border-radius: 8px; font-weight: bold;">
        </form>
    </div>

</div>

</body>
</html>
